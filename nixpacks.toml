[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "ffmpeg",
  "libGL",
  "libGLU",
  "fontconfig",
  "dejavu_fonts",
  "freetype",
  "libjpeg",
  "zlib"
]

[phases.install]
cmds = [
  "python -m ensurepip --upgrade",
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements.txt"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --preload"